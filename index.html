<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meu Universo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow-x: hidden;
      background: #0a0a0f;
      color: white;
    }

    .background {
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #1a1a2e, #0a0a0f);
      z-index: -1;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
      background: rgba(10,10,15,0.5);
    }

    header h1 {
      font-size: 18px;
      letter-spacing: 2px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      opacity: 0.7;
    }

    nav a:hover {
      opacity: 1;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h2 {
      font-size: 42px;
      margin-bottom: 20px;
    }

    .hero p {
      max-width: 600px;
      opacity: 0.7;
      line-height: 1.6;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 24px;
      border: 1px solid white;
      background: transparent;
      color: white;
    }

    .btn:hover {
      background: white;
      color: black;
    }
  </style>
</head>

<body>

  <div class="background"></div>

  <header>
    <h1>MEU UNIVERSO</h1>
    <nav>
      <a href="#">Início</a>
      <a href="#">Poemas</a>
      <a href="#">Músicas</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Um espaço onde a arte respira</h2>
    <p>
      Poemas, ideias e fragmentos de um universo pessoal em construção.
    </p>
    <button class="btn">Explorar</button>
  </section>

</body>
</html>
